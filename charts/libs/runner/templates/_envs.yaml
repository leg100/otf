{{- define "runner.envs" -}}
{{- with .Values.runner }}
{{- with .concurrency }}
- name: OTF_CONCURRENCY
  value: "{{ . }}"
{{- end }}
{{- with .executor }}
- name: OTF_EXECUTOR
  value: "{{ . }}"
{{- end }}
{{- with .kubernetesTTLAfterFinish }}
- name: OTF_KUBERNETES_TTL_AFTER_FINISH
  value: "{{ . }}"
{{- end }}
{{- with .kubernetesLabels }}
- name: OTF_KUBERNETES_LABELS
  value: {{ . | join "," }}
{{- end }}
{{- with .kubernetesRequestCPU }}
- name: OTF_KUBERNETES_REQUEST_CPU
  value: {{ . }}
{{- end }}
{{- with .kubernetesRequestMemory }}
- name: OTF_KUBERNETES_REQUEST_MEMORY
  value: {{ . }}
{{- end }}
{{- with .kubernetesLimitCPU }}
- name: OTF_KUBERNETES_LIMIT_CPU
  value: {{ . }}
{{- end }}
{{- with .kubernetesLimitMemory }}
- name: OTF_KUBERNETES_LIMIT_MEMORY
  value: {{ . }}
{{- end }}
{{- with .kubernetesJobImage }}
- name: OTF_KUBERNETES_JOB_IMAGE
  value: "{{ . }}"
{{- end }}
- name: OTF_ENGINE_BINS_DIR
  value: "/cache/engines"
{{- with .pluginCache }}
- name: OTF_PLUGIN_CACHE
  value: "true"
- name: OTF_PLUGIN_CACHE_DIR
  value: /cache/providers
{{- end }}
{{- if .cacheVolume.enabled }}
- name: OTF_KUBERNETES_CACHE_PVC
  value: {{ include "cacheVolumeName" $ }}
{{- end }}
{{- end }}
{{- end -}}
